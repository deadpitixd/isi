        <h1>Basic Syntax</h1>
        <p>Interscript is similar in syntax to C++ and Python.<br>
        I made it to be like it as i have some experience in both languages,
        and i like the syntax of them.<br></p>

        <h4>
            Syntax:
        </h4>
        <div class="container">
            <code>
            <span class="b">int</span>
            <span class="y">x</span>
            <span class="p">=</span>
            <span class="r">5</span>;
            </code>
        </div>
        <br>
        Here, the program defines a variable named '<span class="y">x</span>', that is an integer, then, it assigns the value <span class="r">5</span> to it.
