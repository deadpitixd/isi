<!-- Use this as a template for funcs -->
<head>
    <title>ISI Functions - input()</title>
    <link rel="stylesheet" href="../style.css">
    <body>
        <div class="content-wrapper">
        <div class="iframe-container">
        <iframe src="../templates/menubuttons.html"></iframe>
        </div>
        <h1><span class="b">input</span>()</h1>
        <h4 class="g">Added in ISI 0.1</h4>
        <div class="container">
            <h4 class="r">WARNING: DEPRECATED USAGE OF</h4><span class="b">[variable] = input()</span><h4 class="r">SINCE ISI 0.2</h4>
        </div>
        
        <p>Allows user to input text into the command line.<br></p>
        <h4>
            Syntax:
        </h4>
        <div class="container">
            <code>
            <span class="b">string</span>
            <span class="y">x</span>
            <span class="p">=</span>
            <span class="b">input</span>();
            </code>
        </div>
        <br>
        It's best to have the variable that gets input be a string, as to not create any type errors.
        <br>
        
        </div>
    </body>
</head>
