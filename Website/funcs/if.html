<head>
    <title>ISI Functions - if () {}</title>
    <link rel="stylesheet" href="../style.css">
    <body>
        <div class="content-wrapper">
        <div class="iframe-container">
        <iframe src="../templates/menubuttons.html"></iframe>
        </div>
        <h1><span class="b">if</span> () {}</h1>
        <p>If statement that executes code if expression inside brackets is true.<br></p>

        <h4>
            Syntax:
        </h4>
        <div class="container">
            <code>
            <span class="b">if</span> (
            <span class="y">x</span>
            <span class="p">== </span><span class="r">5</span> ) {<br>
                <span class="func b">cout</span>("x equals 5");
            <br>}
            </code>
        </div>
        <br>
        It's best to have the variable that gets input be a string, as to not create any type errors.
        <br>
        
        </div>
    </body>
</head>
