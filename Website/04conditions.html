        <h1>Conditional Statements</h1>
        <p>To use conditional statements, you use these operators.</p>

        <h4>
            Operators:
        </h4>
        <div class="container">
            <code>
            <span class="y">x</span>
            <span class="p">==</span>
            <span class="y">y </span> <span class="g">// equals</span>
            <br>
            <span class="y">x</span>
            <span class="p">!=</span>
            <span class="y">y </span> <span class="g">// not equals</span>
            <br>
            <span class="y">x</span>
            <span class="p">></span>
            <span class="y">y </span> <span class="g">// bigger than</span>
            <br>
            <span class="y">x</span>
            <span class="p"><</span>
            <span class="y">y </span> <span class="g">// smaller than</span>
            <br>
            </code>
        </div>
        <br>
        These operators return <span class="b">bools</span>, which are <span class="g">true</span> or <span class="g">false</span>.
        <br>
        They can be used by if statements to execute code.
