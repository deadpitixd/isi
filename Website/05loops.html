        <h1>Loops</h1>
        <p>Loops are created like in C++.<br>
        Their syntax is simple, lets start with the easiest one.</p>
        <br>
        The <span class="b">while</span>(<span class="g">condition</span>){ } loop.
        <br><br>
        The loop executes code inside the curly brackets, if the condition
        is equal to <span class="g">true</span>.

        <h4>
            Example:
        </h4>
<pre><code class="syntax-highlight" data-lang="javascript">
while (true){
    cout("Hello");
}
</code></pre>
