        <h1>Loops</h1>
        <p>Loops are created like in C++.<br>
        Their syntax is simple, lets start with the easiest one.</p>
        <br>
        The <span class="b">while</span>(<span class="g">condition</span>){ } loop.
        <br><br>
        The loop executes code inside the curly brackets, if the condition
        is equal to <span class="g">true</span>.

        <h4>
            Example:
        </h4>
        <div class="container">
            <div>
                <code>
                <span class="b">int</span>
                <span class="y">x</span>; <span class="g">// x = 0</span>
                <br>
                <span class="b">while</span>(<span class="y">x</span>
                <span class="p">!=</span>
                <span class="r">5</span>)
                <br>
                {
                <p style="white-space: pre">    <span class="y">x</span> <span class="p">=</span> <span class="y">x</span> <span class="p">+</span> <span class="r">1</span>;</p>
                <p style="white-space: pre">    <span class="b">cout</span>(<span class="p">x</span>);</p>
                }
                </code>
            </div class>  
        </div>
        <br>
        <span class="b">Output:</span>
        <div class="container">
            12345
        </div>
